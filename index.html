<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePath Home Services | Professional Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1581578731548-c64695cc6958?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; }
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="sparkles" class="text-teal-500"></i>
                <span class="font-bold text-xl tracking-tight text-slate-900">PurePath</span>
            </div>
            <a href="tel:1234567890" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2 rounded-full text-sm font-semibold transition-all shadow-md">
                Get Free Quote
            </a>
        </div>
    </nav>

    <header class="hero-gradient h-[70vh] flex items-center justify-center text-center px-6">
        <div class="max-w-3xl">
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-6 drop-shadow-lg">A Family Touch for a Flawless Home</h1>
            <p class="text-lg md:text-xl text-white/90 mb-8 max-w-2xl mx-auto">Mother-daughter led residential cleaning in Orange County. Eco-friendly, detail-oriented, and fully insured.</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button class="bg-teal-600 hover:bg-teal-700 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all shadow-xl">Book Your Cleaning</button>
                <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md text-white border border-white/30 px-8 py-4 rounded-xl font-bold text-lg transition-all">View Services</button>
            </div>
        </div>
    </header>

    <section class="py-20 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold text-slate-900 mb-4">Our Family Standards</h2>
            <p class="text-slate-500">Professional cleaning services tailored to your lifestyle.</p>
        </div>
        
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl transition-shadow">
                <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="home"></i>
                </div>
                <h3 class="font-bold text-xl mb-3 text-slate-900">Residential Deep Clean</h3>
                <p class="text-slate-600 text-sm leading-relaxed">A top-to-bottom refresh of your entire home, focusing on every corner, baseboard, and hidden surface.</p>
            </div>
            
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl transition-shadow">
                <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="leaf"></i>
                </div>
                <h3 class="font-bold text-xl mb-3 text-slate-900">Eco-Maintenance</h3>
                <p class="text-slate-600 text-sm leading-relaxed">Regular upkeep using 100% non-toxic, pet-safe products. Keep your home safe and sparkling.</p>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl transition-shadow">
                <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center mb-6">
                    <i data-lucide="truck"></i>
                </div>
                <h3 class="font-bold text-xl mb-3 text-slate-900">Move-In/Out</h3>
                <p class="text-slate-600 text-sm leading-relaxed">Making your transition seamless with a thorough cleaning of empty spaces for the next chapter.</p>
            </div>
        </div>
    </section>

    <section class="bg-teal-900 py-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-3xl font-bold text-white mb-8 italic">"We treat every home like it's our own."</h2>
            <div class="flex justify-center items-center gap-4 mb-8">
                <div class="h-px w-12 bg-teal-500"></div>
                <p class="text-teal-300 font-semibold tracking-widest uppercase text-sm font-bold">The Mother-Daughter Team</p>
                <div class="h-px w-12 bg-teal-500"></div>
            </div>
            <p class="text-teal-50/80 leading-loose text-lg">With over 15 years of combined experience in local hospitality and residential care, we realized that what was missing was the personal touch. PurePath was founded to provide reliable, professional cleaning that feels personal, not corporate.</p>
        </div>
    </section>

    <footer class="py-12 px-6 border-t border-slate-200 text-center">
        <div class="flex items-center justify-center gap-2 mb-4">
            <i data-lucide="sparkles" class="text-teal-500 w-5 h-5"></i>
            <span class="font-bold text-lg tracking-tight text-slate-900">PurePath Home Services</span>
        </div>
        <p class="text-slate-400 text-sm mb-6">Serving Huntington Beach & Coastal Orange County</p>
        <div class="pt-8 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">Managed by Mayteck Services | Zero-Cost Infrastructure Tech</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
